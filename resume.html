<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zach Prynne — Resume</title>
  <meta name="description" content="Resume of Zach Prynne, computer science student." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Page-specific layout for the embedded-PDF resume view. */
    .resume {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .toolbar h1 { font-size: 1.5rem; margin: 0 auto 0 0; }

    /* The PDF viewer frame. aspect-ratio keeps US-Letter proportions
       (8.5 x 11) so it scales without distortion on any width. */
    .pdf-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 200px;
    }
    /* Each rendered page. The JS sets width:100% so pages scale with the column;
       height:auto preserves aspect ratio. */
    .pdf-page {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 16px var(--shadow);
    }

    .pdf-note {
      margin-top: 1rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <header class="site-header">
    <nav class="nav" aria-label="Primary">
      <a href="index.html" class="nav__brand">zp<span class="nav__cursor">_</span></a>
      <ul class="nav__links">
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#projects">Projects</a></li>
        <li><a href="resume.html" class="is-active">Resume</a></li>
      </ul>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme" aria-pressed="false">
        <span class="theme-toggle__icon" aria-hidden="true">◐</span>
      </button>
    </nav>
  </header>

  <main id="main" class="resume">
    <div class="toolbar">
      <h1>Resume</h1>
      <!-- 'download' attr makes the browser save the file instead of navigating to it -->
      <a class="btn btn--primary" href="resume.pdf" download>Download PDF</a>
      <a class="btn btn--ghost" href="resume.pdf" target="_blank" rel="noopener">Open in new tab</a>
    </div>

    <!-- PDF.js renders the PDF onto <canvas> elements. Native browser embedding
         (<iframe>/<object>) is unreliable — Safari refuses to show PDFs inline —
         so we rasterize each page ourselves. This works in every browser. -->
    <div id="pdf-container" class="pdf-container" aria-label="Resume preview">
      <p class="pdf-note" id="pdf-status">Loading resume…</p>
    </div>
    <p class="pdf-note">
      Trouble viewing?
      <a href="resume.pdf" download>Download the PDF</a> or
      <a href="resume.pdf" target="_blank" rel="noopener">open it in a new tab</a>.
    </p>
  </main>

  <footer class="site-footer">
    <p>Built with plain HTML, CSS &amp; JS. <a href="https://github.com/zprynne/zprynne.github.io" target="_blank" rel="noopener">Source</a>.</p>
    <p class="site-footer__meta">© <span id="year"></span> Zach Prynne</p>
  </footer>

  <script src="script.js" defer></script>

  <!-- PDF.js loaded as an ES module from a pinned CDN version.
       It fetches resume.pdf, then draws each page to a <canvas>, scaled to the
       container width and the device pixel ratio so it stays crisp on retina. -->
  <script type="module">
    import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs";
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs";

    const container = document.getElementById("pdf-container");
    const status = document.getElementById("pdf-status");

    async function renderResume() {
      try {
        const pdf = await pdfjsLib.getDocument("resume.pdf").promise;
        status.remove(); // drop the "Loading…" message once we have the doc

        // devicePixelRatio: render at the screen's true pixel density so text
        // isn't blurry on high-DPI ("retina") displays.
        const dpr = window.devicePixelRatio || 1;

        for (let n = 1; n <= pdf.numPages; n++) {
          const page = await pdf.getPage(n);
          const unscaled = page.getViewport({ scale: 1 });
          // Fit the page to the container's CSS width.
          const cssScale = container.clientWidth / unscaled.width;
          const viewport = page.getViewport({ scale: cssScale * dpr });

          const canvas = document.createElement("canvas");
          canvas.className = "pdf-page";
          canvas.width = viewport.width;            // backing-store pixels
          canvas.height = viewport.height;
          canvas.style.width = "100%";              // displayed (CSS) size
          canvas.style.height = "auto";
          container.appendChild(canvas);

          await page.render({
            canvasContext: canvas.getContext("2d"),
            viewport,
          }).promise;
        }
      } catch (err) {
        // Network blocked, CDN down, etc. — fall back to the download links.
        if (status) {
          status.innerHTML =
            'Couldn’t load the inline preview. ' +
            '<a href="resume.pdf" download>Download the PDF</a> or ' +
            '<a href="resume.pdf" target="_blank" rel="noopener">open in a new tab</a>.';
        }
        console.error("PDF.js render failed:", err);
      }
    }

    renderResume();
  </script>
</body>
</html>
