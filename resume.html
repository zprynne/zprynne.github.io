<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zach Prynne — Resume</title>
  <meta name="description" content="Resume of Zach Prynne, computer science student." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Page-specific layout for the embedded-PDF resume view. */
    .resume {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .toolbar h1 { font-size: 1.5rem; margin: 0 auto 0 0; }

    /* The PDF viewer frame. aspect-ratio keeps US-Letter proportions
       (8.5 x 11) so it scales without distortion on any width. */
    .pdf-frame {
      width: 100%;
      aspect-ratio: 8.5 / 11;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-elev);
    }

    /* Fallback shown only if the <object> can't render (rare / old mobile). */
    .pdf-fallback {
      padding: 2rem;
      text-align: center;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to content</a>

  <header class="site-header">
    <nav class="nav" aria-label="Primary">
      <a href="index.html" class="nav__brand">zp<span class="nav__cursor">_</span></a>
      <ul class="nav__links">
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#projects">Projects</a></li>
        <li><a href="resume.html" class="is-active">Resume</a></li>
      </ul>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme" aria-pressed="false">
        <span class="theme-toggle__icon" aria-hidden="true">◐</span>
      </button>
    </nav>
  </header>

  <main id="main" class="resume">
    <div class="toolbar">
      <h1>Resume</h1>
      <!-- 'download' attr makes the browser save the file instead of navigating to it -->
      <a class="btn btn--primary" href="resume.pdf" download>Download PDF</a>
      <a class="btn btn--ghost" href="resume.pdf" target="_blank" rel="noopener">Open in new tab</a>
    </div>

    <!-- <object> embeds the PDF using the browser's native viewer. The inner
         content is a fallback that only renders if embedding isn't supported. -->
    <object class="pdf-frame" data="resume.pdf" type="application/pdf" aria-label="Resume PDF">
      <div class="pdf-fallback">
        <p>Your browser can't display embedded PDFs.</p>
        <p><a class="btn btn--primary" href="resume.pdf" download>Download the PDF instead</a></p>
      </div>
    </object>
  </main>

  <footer class="site-footer">
    <p>Built with plain HTML, CSS &amp; JS. <a href="https://github.com/zprynne/zprynne.github.io" target="_blank" rel="noopener">Source</a>.</p>
    <p class="site-footer__meta">© <span id="year"></span> Zach Prynne</p>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>
